schema_version: "1.0"

extension:
  id: repository-governance
  name: "Repository Governance"
  version: "3.0.0"
  description: "Refresh project-governance projections from Spec Kit metadata"
  author: "bigben"
  repository: "https://github.com/bigsmartben/spec-kit-agent-governance"
  homepage: "https://github.com/bigsmartben/spec-kit-agent-governance"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: "uv"
      required: true

provides:
  commands:
    - name: "speckit.repository-governance.refresh"
      file: "commands/speckit.repository-governance.refresh.md"
      description: "Refresh the active project-governance projection"

hooks:
  after_constitution:
    command: "speckit.repository-governance.refresh"
    optional: true
    prompt: "Refresh project-governance projection after constitution changes?"
    description: "Refreshes the active agent platform target"
  after_plan:
    command: "speckit.repository-governance.refresh"
    optional: true
    prompt: "Refresh project-governance projection after planning?"
    description: "Keeps the active agent platform target aligned"
  after_tasks:
    command: "speckit.repository-governance.refresh"
    optional: true
    prompt: "Refresh project-governance projection after task generation?"
    description: "Keeps the active agent platform target aligned"

tags:
  - "governance"
  - "agents"
  - "memory"
  - "context"

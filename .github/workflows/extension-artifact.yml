name: Extension Artifact

permissions:
  contents: write

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to the tag version or next extension.yml patch version."
        required: false
        type: string
      spec_kit_ref:
        description: "bigsmartben/spec-kit git ref to install and target for integration PRs."
        required: false
        default: "main"
        type: string
      create_integration_pr:
        description: "Create or update a bigsmartben/spec-kit integration PR after a verified build."
        required: false
        default: false
        type: boolean

concurrency:
  group: extension-artifact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-verify-release-pr:
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version || '' }}
      INPUT_SPEC_KIT_REF: ${{ inputs.spec_kit_ref || 'main' }}
      CREATE_INTEGRATION_PR: ${{ inputs.create_integration_pr || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Check workflow YAML syntax
        run: |
          uv run --locked python - <<'PY'
          import yaml
          from pathlib import Path

          for workflow in Path(".github/workflows").glob("*.yml"):
              yaml.safe_load(workflow.read_text(encoding="utf-8"))
          PY

      - name: Compile governance sources
        run: uv run --locked python -m py_compile scripts/refresh_repository_governance.py tests/test_governance_domains.py

      - name: Run governance contract tests
        run: uv run --locked pytest -q

      - name: Derive and validate version
        id: version
        run: |
          set -euo pipefail

          EXTENSION_VERSION="$(python3 - <<'PY'
          from pathlib import Path

          for line in Path("extension.yml").read_text(encoding="utf-8").splitlines():
              if line.strip().startswith("version:"):
                  print(line.split(":", 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit("extension.yml version not found")
          PY
          )"
          PROJECT_VERSION="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])
          PY
          )"
          if [[ "${EXTENSION_VERSION}" != "${PROJECT_VERSION}" ]]; then
            echo "extension.yml version ${EXTENSION_VERSION} does not match pyproject.toml ${PROJECT_VERSION}" >&2
            exit 1
          fi

          TAG_VERSION=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi

          NEXT_PATCH_VERSION="$(python3 - <<'PY'
          from pathlib import Path

          version = ""
          for line in Path("extension.yml").read_text(encoding="utf-8").splitlines():
              if line.strip().startswith("version:"):
                  version = line.split(":", 1)[1].strip().strip('"')
                  break
          major, minor, patch = (int(part) for part in version.split("."))
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )"

          VERSION="${INPUT_VERSION:-${TAG_VERSION:-${NEXT_PATCH_VERSION}}}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use X.Y.Z format: ${VERSION}" >&2
            exit 1
          fi
          if [[ -n "${INPUT_VERSION}" && "${VERSION}" != "${EXTENSION_VERSION}" && "${VERSION}" != "${NEXT_PATCH_VERSION}" ]]; then
            echo "Manual version ${VERSION} must match extension.yml version ${EXTENSION_VERSION} or next patch ${NEXT_PATCH_VERSION}" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${VERSION}" != "${EXTENSION_VERSION}" && "${VERSION}" != "${NEXT_PATCH_VERSION}" ]]; then
            echo "Tag version ${VERSION} must match extension.yml version ${EXTENSION_VERSION} or next patch ${NEXT_PATCH_VERSION}" >&2
            exit 1
          fi
          if [[ -n "${TAG_VERSION}" && "${VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Version ${VERSION} does not match tag v${TAG_VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=repository-governance-v${VERSION}.zip" >> "${GITHUB_OUTPUT}"

      - name: Apply release version to extension workspace
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          version = os.environ["VERSION"]

          extension_path = Path("extension.yml")
          extension_text = extension_path.read_text(encoding="utf-8")
          extension_text = re.sub(r'(?m)^  version: "[0-9]+\.[0-9]+\.[0-9]+"$', f'  version: "{version}"', extension_text)
          extension_path.write_text(extension_text, encoding="utf-8")

          pyproject_path = Path("pyproject.toml")
          pyproject_text = pyproject_path.read_text(encoding="utf-8")
          current = tomllib.loads(pyproject_text)["project"]["version"]
          pyproject_text = pyproject_text.replace(f'version = "{current}"', f'version = "{version}"', 1)
          pyproject_path.write_text(pyproject_text, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          readme = re.sub(
              r"archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.zip",
              f"archive/refs/tags/v{version}.zip",
              readme,
          )
          readme_path.write_text(readme, encoding="utf-8")
          PY

      - name: Build extension artifact
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ZIP_NAME="repository-governance-v${VERSION}.zip"
          rm -f "${ZIP_NAME}"

          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile, ZipInfo
          import os

          version = os.environ["VERSION"]
          zip_name = f"repository-governance-v{version}.zip"
          include_roots = [
              "extension.yml",
              "commands",
              "scripts",
              "templates",
          ]
          files = []

          for root in include_roots:
              path = Path(root)
              if path.is_file():
                  files.append(path)
                  continue
              for file_path in path.rglob("*"):
                  if file_path.is_file():
                      files.append(file_path)

          with ZipFile(zip_name, "w", compression=ZIP_DEFLATED) as archive:
              for file_path in sorted(files, key=lambda item: item.as_posix()):
                  info = ZipInfo(file_path.as_posix(), date_time=(1980, 1, 1, 0, 0, 0))
                  info.compress_type = ZIP_DEFLATED
                  info.external_attr = 0o644 << 16
                  archive.writestr(info, file_path.read_bytes())
          PY

          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${GITHUB_WORKSPACE}/${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Verify extension artifact
        env:
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          import zipfile

          required_entries = {
              "extension.yml",
              "commands/speckit.repository-governance.refresh.md",
              "scripts/refresh_repository_governance.py",
              "templates/repository-governance-template.md",
          }
          forbidden_prefixes = (".github/", ".git/", "docs/", "tests/", "__pycache__/")
          forbidden_entries = {"AGENTS.md", "pyproject.toml", "uv.lock", "CHANGELOG.md", ".extensionignore"}

          with zipfile.ZipFile(os.environ["ZIP_NAME"]) as archive:
              names = set(archive.namelist())

          missing = sorted(required_entries - names)
          if missing:
              print(f"Missing required artifact entries: {missing}", file=sys.stderr)
              sys.exit(1)
          forbidden = sorted(
              name
              for name in names
              if name in forbidden_entries or name.startswith(forbidden_prefixes)
          )
          if forbidden:
              print(f"Forbidden artifact entries: {forbidden}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Install specify from fork
        run: |
          set -euo pipefail
          python3 -m pip install "git+https://github.com/bigsmartben/spec-kit.git@${INPUT_SPEC_KIT_REF}"

      - name: Smoke install extension on GitHub runner
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          project_dir="$(mktemp -d "${RUNNER_TEMP}/repository-governance-smoke.XXXXXX")"
          trap 'rm -rf "$project_dir"' EXIT
          cd "$project_dir"
          specify init --here --ai codex --script sh --ignore-agent-tools
          specify extension remove repository-governance --force
          specify extension add --dev "$GITHUB_WORKSPACE"
          test -f .specify/extensions/repository-governance/extension.yml
          test -f .specify/extensions/repository-governance/templates/repository-governance-template.md
          test -f .agents/skills/speckit-repository-governance-refresh/SKILL.md

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Create or update release artifact
        if: ${{ github.ref_type == 'tag' || env.CREATE_INTEGRATION_PR == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG_NAME="v${VERSION}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" && "${CREATE_INTEGRATION_PR}" == "true" ]]; then
            if ! git rev-parse --verify --quiet "refs/tags/v${VERSION}" >/dev/null; then
              echo "Manual integration PR creation requires refs/tags/v${VERSION} to exist." >&2
              exit 1
            fi
            HEAD_SHA="$(git rev-parse HEAD)"
            TAG_SHA="$(git rev-parse "refs/tags/v${VERSION}^{}")"
            if [[ "${HEAD_SHA}" != "${TAG_SHA}" ]]; then
              echo "Manual integration PR creation requires HEAD ${HEAD_SHA} to match refs/tags/v${VERSION} ${TAG_SHA}." >&2
              exit 1
            fi
          fi
          gh release view "${TAG_NAME}" >/dev/null 2>&1 || gh release create "${TAG_NAME}" --verify-tag --title "${TAG_NAME}" --notes ""
          gh release upload "${TAG_NAME}" "${ZIP_PATH}" --clobber

      - name: Create or update spec-kit integration PR
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && env.CREATE_INTEGRATION_PR == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.SPEC_KIT_FORK_PR_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            if [[ "${CREATE_INTEGRATION_PR}" == "true" ]]; then
              echo "SPEC_KIT_FORK_PR_TOKEN is required when integration PR creation is requested." >&2
              exit 1
            fi
            echo "SPEC_KIT_FORK_PR_TOKEN is unavailable; skipping spec-kit integration PR."
            exit 0
          fi

          gh auth setup-git
          fork_dir="$(mktemp -d)"
          gh repo clone bigsmartben/spec-kit "${fork_dir}/spec-kit" -- --depth 1 --branch "${INPUT_SPEC_KIT_REF}"

          rsync -a --delete --delete-excluded \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "docs/superpowers/" \
            --exclude "AGENTS.md" \
            --exclude "docs/" \
            --exclude "pyproject.toml" \
            --exclude "uv.lock" \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            --exclude ".pytest_cache/" \
            --exclude "tests/" \
            --exclude ".venv/" \
            --exclude "dist/" \
            --exclude "*.zip" \
            --exclude ".DS_Store" \
            --exclude "repository-governance-v*.zip" \
            "${GITHUB_WORKSPACE}/" "${fork_dir}/spec-kit/extensions/repository-governance/"

          cd "${fork_dir}/spec-kit"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          catalog_path = Path("extensions/catalog.json")
          manifest_path = Path("extensions/repository-governance/extension.yml")
          catalog = json.loads(catalog_path.read_text(encoding="utf-8"))
          manifest = manifest_path.read_text(encoding="utf-8")

          def manifest_value(key: str) -> str:
              for line in manifest.splitlines():
                  stripped = line.strip()
                  if stripped.startswith(f"{key}:"):
                      return stripped.split(":", 1)[1].strip().strip('"')
              raise SystemExit(f"{key} not found in extension.yml")

          entry = catalog["extensions"]["repository-governance"]
          entry["version"] = version
          entry["name"] = manifest_value("name")
          entry["description"] = manifest_value("description")
          entry["repository"] = manifest_value("repository")
          entry["license"] = manifest_value("license")
          catalog_path.write_text(json.dumps(catalog, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

          python3 -m pip install -e '.[test]'
          python3 -m py_compile extensions/repository-governance/scripts/refresh_repository_governance.py
          python3 -m pytest -q \
            tests/test_extensions.py::TestBundledCommunityExtensionLocator \
            tests/integrations/test_cli.py::TestGitExtensionAutoInstall::test_community_extensions_and_workflow_preset_auto_installed \
            tests/integrations/test_cli.py::TestGitExtensionAutoInstall::test_no_git_keeps_community_defaults
          python3 -m json.tool extensions/catalog.json >/dev/null

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="extension-release-v${VERSION}"
          git switch -C "${branch}" "origin/${INPUT_SPEC_KIT_REF}"
          git add extensions/catalog.json extensions/repository-governance
          if git diff --cached --quiet; then
            echo "No repository-governance integration changes to commit."
            exit 0
          fi
          git commit -m "Update repository-governance extension to v${VERSION}"
          git push --force-with-lease origin "${branch}"

          body_file="$(mktemp)"
          {
            echo "## Summary"
            echo "- Update bundled repository-governance extension to v${VERSION}."
            echo "- Update extensions/catalog.json metadata."
            echo
            echo "## Test Plan"
            echo "- [x] python3 -m py_compile extensions/repository-governance/scripts/refresh_repository_governance.py"
            echo "- [x] python3 -m pytest -q tests/test_extensions.py::TestBundledCommunityExtensionLocator tests/integrations/test_cli.py::TestGitExtensionAutoInstall::test_community_extensions_and_workflow_preset_auto_installed tests/integrations/test_cli.py::TestGitExtensionAutoInstall::test_no_git_keeps_community_defaults"
            echo "- [x] python3 -m json.tool extensions/catalog.json >/dev/null"
          } > "${body_file}"
          if gh pr view "${branch}" --repo bigsmartben/spec-kit >/dev/null 2>&1; then
            gh pr edit "${branch}" --repo bigsmartben/spec-kit \
              --title "Update repository-governance extension to v${VERSION}" \
              --body-file "${body_file}"
          else
            gh pr create --repo bigsmartben/spec-kit \
              --base "${INPUT_SPEC_KIT_REF}" \
              --head "${branch}" \
              --title "Update repository-governance extension to v${VERSION}" \
              --body-file "${body_file}"
          fi
